# https://docs.docker.com/build/ci/github-actions/
name: Build Dev Container Images

on:
  # https://docs.github.com/en/actions/reference/events-that-trigger-workflows
  push:
  workflow_dispatch:

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
    permissions:
      id-token: write
      contents: read
      attestations: write
      packages: write
    strategy:
      matrix:
        image:
          - name: go
            variant: 1.23-bookworm
          - name: go
            variant: 1.22-bookworm
          - name: python
            variant: 3.13-bookworm
          - name: python
            variant: 3.12-bookworm
          - name: python
            variant: 3.11-bookworm
          - name: python
            variant: 3.10-bookworm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository_owner }}/devcontainer-${{ matrix.image.name }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/devcontainer-${{ matrix.image.name }}
          tags: |
            type=raw,enable=true,value=${{ matrix.image.variant }}
          labels: |
            org.opencontainers.image.version=${{ matrix.image.variant }}
      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: images/${{ matrix.image.name }}
          push: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VARIANT=${{ matrix.image.variant }}
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/devcontainer-${{ matrix.image.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
